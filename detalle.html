<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Publicación - Mini Pinterest</title>
  <link rel="stylesheet" href="detalle.css">
</head>
<body>
  <header>
    <h1>Mini Pinterest</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <a class="link-login" href="login.html">Login</a>
      <a class="link-register" href="register.html">Registro</a>
      <a class="link-usuario" href="usuario.html">Usuario</a>
      <a class="link-salir" href="#">Salir</a>
      <span class="nav-user"></span>
    </nav>
  </header>

  <main class="container">
    <section class="detail-box">
      <img id="imagen" src="https://picsum.photos/900/500?random=5" alt="Detalle de publicación">
      <div class="detail-content">
        <h2 id="titulo">Cargando publicación...</h2>
        <p class="detail-meta" id="autor"></p>
        <p id="descripcion"></p>
        <p id="archivoAdjunto"></p>

        <div class="comments">
          <h4>Comentarios</h4>
          <ul id="comentarios"></ul>

          <form id="comentarioForm" class="comment-form">
            <label for="contenidoComentario">Agregar comentario</label>
            <textarea id="contenidoComentario" placeholder="Escribe tu comentario" required></textarea>
            <button type="submit">Comentar</button>
            <p id="mensajeComentario"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="api.js"></script>
  <script>
    const id = obtenerParametro("id") || 1;

    function cargarDetalle() {
      apiGet("/publicaciones/" + id)
        .done(function (publicacion) {
          $("#imagen").attr("src", publicacion.imagen_url).attr("alt", publicacion.titulo);
          $("#titulo").text(publicacion.titulo);
          $("#autor").text("Subido por: @" + publicacion.usuario);
          $("#descripcion").text(publicacion.descripcion);

          if (publicacion.archivo_url) {
            const url = escaparHtml(publicacion.archivo_url);
            const nombre = publicacion.archivo_nombre ? escaparHtml(publicacion.archivo_nombre) : "adjunto";
            $("#archivoAdjunto").html(`<a href="${url}" download="${nombre}">Descargar archivo adjunto</a>`);
          } else {
            $("#archivoAdjunto").text("");
          }
        })
        .fail(function () {
          $("#titulo").text("No se pudo conectar con la API o la publicación no existe.");
        });
    }

    function crearComentario(comentario) {
      return `<li><strong>@${escaparHtml(comentario.autor)}:</strong> ${escaparHtml(comentario.contenido)}</li>`;
    }

    function cargarComentarios() {
      apiGet("/comentarios/publicacion/" + id)
        .done(function (comentarios) {
          const lista = $("#comentarios");
          lista.empty();

          if (comentarios.length === 0) {
            lista.append("<li>Aún no hay comentarios.</li>");
            return;
          }

          $.each(comentarios, function (_, comentario) {
            lista.append(crearComentario(comentario));
          });
        })
        .fail(function () {
          $("#comentarios").html("<li>No se pudieron cargar los comentarios.</li>");
        });
    }

    $(document).ready(function () {
      cargarDetalle();
      cargarComentarios();

      $("#comentarioForm").on("submit", function (event) {
        event.preventDefault();
        const usuarioActual = getUsuarioActual();

        const datos = {
          autor: usuarioActual ? usuarioActual.usuario : "visitante",
          contenido: $("#contenidoComentario").val().trim(),
          publicacion_id: Number(id)
        };

        mostrarMensaje("#mensajeComentario", "Guardando comentario...", "info");

        apiPost("/comentarios/", datos)
          .done(function () {
            mostrarMensaje("#mensajeComentario", "Comentario guardado.", "exito");
            $("#comentarioForm")[0].reset();
            cargarComentarios();
          })
          .fail(function (error) {
            const detalle = error.responseJSON && error.responseJSON.detail ? error.responseJSON.detail : "No se pudo guardar el comentario.";
            mostrarMensaje("#mensajeComentario", detalle, "error");
          });
      });
    });
  </script>
</body>
</html>
