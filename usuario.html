<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Usuario - Mini Pinterest</title>
  <link rel="stylesheet" href="usuario.css">
</head>
<body>
  <header>
    <h1>Mini Pinterest</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <a class="link-login" href="login.html">Login</a>
      <a class="link-register" href="register.html">Registro</a>
      <a class="link-usuario" href="usuario.html">Usuario</a>
      <a class="link-salir" href="#">Salir</a>
      <span class="nav-user"></span>
    </nav>
  </header>

  <main class="container">
    <section class="profile">
      <h2 id="nombre">Nombre:</h2>
      <p id="usuario">Usuario:</p>
      <p id="correo">Correo:</p>
    </section>

    <section class="form-box" id="crearPublicacionBox">
      <h3>Crear nueva publicación</h3>
      <form id="publicacionForm">
        <div class="form-group">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" placeholder="Ej. Idea para mi habitación" required>
        </div>
        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" placeholder="Describe tu idea" required></textarea>
        </div>
        <div class="form-group">
          <label for="imagen_url">URL de imagen</label>
          <input type="url" id="imagen_url" placeholder="https://picsum.photos/400/300" required>
        </div>
        <button type="submit">Publicar</button>
        <p id="mensaje"></p>
      </form>
    </section>

    <section class="mis-posts-header">
      <h3>Mis publicaciones</h3>
      <button type="button" id="recargar">Recargar</button>
    </section>

    <section class="grid" id="misPublicaciones"></section>
  </main>

  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="api.js"></script>
  <script>
    const usuarioActual = getUsuarioActual();

    function crearCardUsuario(publicacion) {
      return `
        <article class="card" data-id="${publicacion.id}">
          <a href="detalle.html?id=${publicacion.id}">
            <img src="${escaparHtml(publicacion.imagen_url)}" alt="${escaparHtml(publicacion.titulo)}">
          </a>
          <div class="card-content">
            <h3>${escaparHtml(publicacion.titulo)}</h3>
            <p>${escaparHtml(publicacion.descripcion)}</p>
            <div class="card-actions">
              <a class="btn-secundario" href="detalle.html?id=${publicacion.id}">Ver detalle</a>
              <button type="button" class="btn-eliminar" data-id="${publicacion.id}">Eliminar</button>
            </div>
          </div>
        </article>
      `;
    }

    function mostrarPublicaciones(publicaciones) {
      const contenedor = $("#misPublicaciones");
      contenedor.empty();

      if (publicaciones.length === 0) {
        contenedor.html("<p>Este usuario aún no tiene publicaciones.</p>");
        return;
      }

      $.each(publicaciones, function (_, publicacion) {
        contenedor.append(crearCardUsuario(publicacion));
      });

      $(".card").hide().fadeIn(250);
    }

    function cargarMisPublicaciones() {
      if (!usuarioActual) return;

      apiGet("/publicaciones/usuario/" + usuarioActual.id)
        .done(mostrarPublicaciones)
        .fail(function () {
          $("#misPublicaciones").text("No se pudo conectar con la API.");
        });
    }

    function prepararUsuario() {
      if (!usuarioActual) {
        $("#nombre").text("No has iniciado sesión");
        $("#usuario").text("Entra con ana01 / 1234 o registra una cuenta nueva.");
        $("#correo").hide();
        $("#crearPublicacionBox").hide();
        $("#misPublicaciones").html('<p>Debes iniciar sesión para crear y ver tus publicaciones.</p>');
        return;
      }

      $("#nombre").text("Nombre: " + usuarioActual.nombre);
      $("#usuario").text("Usuario: @" + usuarioActual.usuario);
      $("#correo").text("Correo: " + usuarioActual.correo);
      cargarMisPublicaciones();
    }

    $(document).ready(function () {
      prepararUsuario();

      $("#recargar").on("click", cargarMisPublicaciones);

      $("#publicacionForm").on("submit", function (event) {
        event.preventDefault();

        const datos = {
          titulo: $("#titulo").val().trim(),
          descripcion: $("#descripcion").val().trim(),
          imagen_url: $("#imagen_url").val().trim(),
          usuario_id: usuarioActual.id
        };

        mostrarMensaje("#mensaje", "Guardando publicación...", "info");

        apiPost("/publicaciones/", datos)
          .done(function () {
            mostrarMensaje("#mensaje", "Publicación guardada correctamente.", "exito");
            $("#publicacionForm")[0].reset();
            cargarMisPublicaciones();
          })
          .fail(function (error) {
            const detalle = error.responseJSON && error.responseJSON.detail ? error.responseJSON.detail : "No se pudo guardar la publicación.";
            mostrarMensaje("#mensaje", detalle, "error");
          });
      });

      $("#misPublicaciones").on("click", ".btn-eliminar", function () {
        const id = $(this).data("id");
        const card = $(this).closest(".card");

        if (!confirm("¿Seguro que quieres eliminar esta publicación?")) {
          return;
        }

        apiDelete("/publicaciones/" + id)
          .done(function () {
            card.fadeOut(200, function () {
              $(this).remove();
              cargarMisPublicaciones();
            });
          })
          .fail(function () {
            alert("No se pudo eliminar la publicación.");
          });
      });
    });
  </script>
</body>
</html>
