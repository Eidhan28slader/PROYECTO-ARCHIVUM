<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - Mini Pinterest</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>Mini Pinterest</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <a class="link-login" href="login.html">Login</a>
      <a class="link-register" href="register.html">Registro</a>
      <a class="link-usuario" href="usuario.html">Usuario</a>
      <a class="link-salir" href="#">Salir</a>
      <span class="nav-user"></span>
    </nav>
  </header>

  <main class="container">
    <section class="page-title">
      <div>
        <h2>Publicaciones</h2>
        <p>Explora ideas guardadas por la comunidad.</p>
      </div>
      <input type="search" id="buscador" placeholder="Buscar por título o usuario">
    </section>

    <p id="mensaje" class="mensaje-info">Cargando publicaciones...</p>
    <section class="grid" id="publicaciones"></section>
  </main>

  <div class="footer">Avance integrador con FastAPI, SQLite y jQuery</div>

  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="api.js"></script>
  <script>
    let publicacionesGlobal = [];

    function crearCard(publicacion) {
      return `
        <article class="card" data-titulo="${escaparHtml(publicacion.titulo).toLowerCase()}" data-usuario="${escaparHtml(publicacion.usuario).toLowerCase()}">
          <a href="detalle.html?id=${publicacion.id}">
            <img src="${escaparHtml(publicacion.imagen_url)}" alt="${escaparHtml(publicacion.titulo)}">
          </a>
          <div class="card-content">
            <h3>${escaparHtml(publicacion.titulo)}</h3>
            <p>${escaparHtml(publicacion.descripcion)}</p>
            <small>Subido por: @${escaparHtml(publicacion.usuario)}</small>
          </div>
        </article>
      `;
    }

    function mostrarPublicaciones(publicaciones) {
      const contenedor = $("#publicaciones");
      contenedor.empty();

      if (publicaciones.length === 0) {
        mostrarMensaje("#mensaje", "No hay publicaciones disponibles.", "info");
        return;
      }

      $("#mensaje").text("");
      $.each(publicaciones, function (_, publicacion) {
        contenedor.append(crearCard(publicacion));
      });

      $(".card").hide().fadeIn(250);
    }

    function filtrarPublicaciones() {
      const texto = $("#buscador").val().toLowerCase().trim();
      $(".card").each(function () {
        const coincideTitulo = $(this).data("titulo").includes(texto);
        const coincideUsuario = $(this).data("usuario").includes(texto);
        $(this).toggle(coincideTitulo || coincideUsuario);
      });
    }

    function cargarPublicaciones() {
      mostrarMensaje("#mensaje", "Cargando publicaciones...", "info");
      apiGet("/publicaciones/")
        .done(function (data) {
          publicacionesGlobal = data;
          mostrarPublicaciones(publicacionesGlobal);
        })
        .fail(function () {
          mostrarMensaje("#mensaje", "No se pudo conectar con la API. Revisa que uvicorn esté corriendo.", "error");
        });
    }

    $(document).ready(function () {
      cargarPublicaciones();
      $("#buscador").on("keyup search", filtrarPublicaciones);
    });
  </script>
</body>
</html>
