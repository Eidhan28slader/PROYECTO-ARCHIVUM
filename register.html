<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Mini Pinterest</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <header>
    <h1>Mini Pinterest</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <a class="link-login" href="login.html">Login</a>
      <a class="link-register" href="register.html">Registro</a>
      <a class="link-usuario" href="usuario.html">Usuario</a>
      <a class="link-salir" href="#">Salir</a>
      <span class="nav-user"></span>
    </nav>
  </header>

  <main class="container">
    <section class="form-box">
      <h2>Crear cuenta</h2>
      <form id="registerForm">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" placeholder="Tu usuario" required>
        </div>

        <div class="form-group">
          <label for="correo">Correo</label>
          <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="********" required>
        </div>

        <button type="submit">Registrarme</button>
        <p id="mensaje"></p>
      </form>
    </section>
  </main>

  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="api.js"></script>
  <script>
    $(document).ready(function () {
      $("#registerForm").on("submit", function (event) {
        event.preventDefault();

        const datos = {
          nombre: $("#nombre").val().trim(),
          usuario: $("#usuario").val().trim(),
          correo: $("#correo").val().trim(),
          password: $("#password").val().trim()
        };

        mostrarMensaje("#mensaje", "Creando cuenta...", "info");

        apiPost("/usuarios/", datos)
          .done(function (usuario) {
            guardarUsuarioActual(usuario);
            mostrarMensaje("#mensaje", "Cuenta creada correctamente. Redirigiendo...", "exito");
            setTimeout(function () {
              window.location.href = "usuario.html";
            }, 500);
          })
          .fail(function (error) {
            const detalle = error.responseJSON && error.responseJSON.detail ? error.responseJSON.detail : "No se pudo registrar.";
            mostrarMensaje("#mensaje", detalle, "error");
          });
      });
    });
  </script>
</body>
</html>
