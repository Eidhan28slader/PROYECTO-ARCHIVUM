<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mini Pinterest</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <header>
    <h1>Mini Pinterest</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <a class="link-login" href="login.html">Login</a>
      <a class="link-register" href="register.html">Registro</a>
      <a class="link-usuario" href="usuario.html">Usuario</a>
      <a class="link-salir" href="#">Salir</a>
      <span class="nav-user"></span>
    </nav>
  </header>

  <main class="container">
    <section class="form-box">
      <h2>Iniciar sesión</h2>
      <p class="help-text">Cuenta de prueba: <strong>ana01</strong> / <strong>1234</strong></p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo o usuario</label>
          <input type="text" id="email" placeholder="correo o usuario" required>
        </div>

        <div class="form-group">
          <label for="clave">Contraseña</label>
          <input type="password" id="clave" placeholder="********" required>
        </div>

        <button type="submit">Entrar</button>
        <p id="mensaje"></p>
      </form>
    </section>
  </main>

  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="api.js"></script>
  <script>
    $(document).ready(function () {
      $("#loginForm").on("submit", function (event) {
        event.preventDefault();

        const datos = {
          usuario_o_correo: $("#email").val().trim(),
          password: $("#clave").val().trim()
        };

        mostrarMensaje("#mensaje", "Validando datos...", "info");

        apiPost("/usuarios/login", datos)
          .done(function (usuario) {
            guardarUsuarioActual(usuario);
            mostrarMensaje("#mensaje", "Inicio de sesión correcto. Redirigiendo...", "exito");
            setTimeout(function () {
              window.location.href = "usuario.html";
            }, 500);
          })
          .fail(function () {
            mostrarMensaje("#mensaje", "Usuario o contraseña incorrectos.", "error");
          });
      });
    });
  </script>
</body>
</html>
